<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Azra İrem Dalhasanoğlu — Sohbet </title>
<link rel="icon" type="image/png" href="/karakter.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
          
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,500&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F6F2FB;
    --panel:#FFFFFF;
    --bubble-bot:#EFE9FA;
    --bubble-user:#FFE6D8;
    --accent:#7C6FE0;
    --accent-dark:#5C4CD1;
    --coral:#FF9B7A;
    --mint:#8FD9C4;
    --text:#2E2A3D;
    --text-soft:#7A7389;
    --border:#E9E2F5;
    --shadow: 0 20px 50px -20px rgba(92,76,209,0.25);
    --radius-lg:22px;
    --radius-md:16px;
    --font-display:'Fraunces', serif;
    --font-body:'Plus Jakarta Sans', sans-serif;
    --font-mono:'JetBrains Mono', monospace;
  }

  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    font-family:var(--font-body);
    background:
      radial-gradient(circle at 15% 10%, #EFE4FF 0%, transparent 45%),
      radial-gradient(circle at 90% 85%, #FFE9DC 0%, transparent 40%),
      var(--bg);
    color:var(--text);
    display:flex;
    align-items:center;
    justify-content:center;
    min-height:100vh;
    padding:24px;
  }

  /* ---------- Splash ---------- */
  #splash{
    position:fixed;
    inset:0;
    background:linear-gradient(160deg,#8aeb7d 0%, #B79CF0 55%, #FFB79B 130%);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:18px;
    z-index:50;
    transition:opacity .6s ease, visibility .6s ease;
  }
  #splash.hide{opacity:0; visibility:hidden; pointer-events:none;}
  .splash-mark{
    width:74px;height:74px;border-radius:22px;
    background:rgba(255,255,255,.18);
    backdrop-filter:blur(6px);
    display:flex;align-items:center;justify-content:center;
    font-family:var(--font-display);
    font-weight:700;
    font-size:28px;
    color:#fff;
    border:1px solid rgba(255,255,255,.35);
    overflow:hidden;
  }
  .splash-title{
    color:#fff;
    font-family:var(--font-mono);
    font-size:14px;
    letter-spacing:.08em;
  }
  .splash-dots{display:flex; gap:6px;}
  .splash-dots span{
    width:6px;height:6px;border-radius:50%;
    background:#fff; opacity:.5;
    animation:pulse 1.1s infinite ease-in-out;
  }
  .splash-dots span:nth-child(2){animation-delay:.15s;}
  .splash-dots span:nth-child(3){animation-delay:.3s;}
  @keyframes pulse{
    0%,80%,100%{opacity:.35; transform:scale(0.8);}
    40%{opacity:1; transform:scale(1);}
  }

  /* ---------- Chat shell ---------- */
  #app{
    width:100%;
    max-width:620px;
    height:min(860px, 92vh);
    background:var(--panel);
    border-radius:28px;
    box-shadow:var(--shadow);
    border:1px solid var(--border);
    display:flex;
    flex-direction:column;
    overflow:hidden;
    opacity:0;
    transform:translateY(14px);
    transition:opacity .7s ease, transform .7s ease;
  }
  #app.show{opacity:1; transform:translateY(0);}

  header.chatbar{
    display:flex;
    align-items:center;
    gap:12px;
    padding:16px 20px;
    border-bottom:1px solid var(--border);
    background:linear-gradient(180deg, #FDFBFF);
    flex-shrink:0;
  }
  .avatar{
    width:44px;height:44px;border-radius:50%;
    background:#FFF3EA;
    overflow:hidden;
    display:flex;align-items:center;justify-content:center;
    flex-shrink:0;
    position:relative;
  }
  .avatar svg{ width:100%; height:100%; display:block; }
  .avatar::after{
    content:'';
    position:absolute;
    bottom:-1px; right:-1px;
    width:11px;height:11px;
    background:#57D18C;
    border:2px solid #fff;
    border-radius:50%;
    z-index:2;
  }
  .chatbar-info{flex:1; min-width:0;}
  .chatbar-info .name{
    font-family:var(--font-display);
    font-weight:600;
    font-size:16.5px;
    line-height:1.2;
  }
  .chatbar-info .status{
    font-size:12.5px;
    color:var(--text-soft);
    display:flex;
    align-items:center;
    gap:5px;
  }
  .chatbar-info .status::before{
    content:'';
    width:6px;height:6px;border-radius:50%;
    background:#57D18C;
  }
  .home-btn{
    border:1px solid var(--border);
    background:#fff;
    color:var(--text-soft);
    font-family:var(--font-body);
    font-size:12.5px;
    font-weight:600;
    padding:8px 13px;
    border-radius:100px;
    cursor:pointer;
    transition:all .2s ease;
    flex-shrink:0;
  }
  .home-btn:hover{background:var(--bubble-bot); color:var(--accent-dark); border-color:var(--accent);}

  /* ---------- Messages ---------- */
  #thread{
    flex:1;
    overflow-y:auto;
    padding:22px 18px 10px;
    display:flex;
    flex-direction:column;
    gap:4px;
    scroll-behavior:smooth;
  }
  #thread::-webkit-scrollbar{width:6px;}
  #thread::-webkit-scrollbar-thumb{background:#c5ffb3; border-radius:10px;}

  .row{
    display:flex;
    gap:9px;
    margin:5px 0;
    max-width:100%;
    animation:rise .35s ease both;
  }
  @keyframes rise{
    from{opacity:0; transform:translateY(8px);}
    to{opacity:1; transform:translateY(0);}
  }
  .row.bot{align-self:flex-start;}
  .row.user{align-self:flex-end; flex-direction:row-reverse; margin-left:auto;}

  .row .mini-avatar{
    width:26px;height:26px;border-radius:50%;
    background:#FFF3EA;
    overflow:hidden;
    flex-shrink:0;
    margin-top:auto;
  }
  .row .mini-avatar svg{ width:100%; height:100%; display:block; }

  .avatar .eyelid-cover, .mini-avatar .eyelid-cover{
    opacity:0;
    animation:girlBlink 4.6s ease-in-out infinite;
  }
  .mini-avatar .eyelid-cover{ animation-delay:.4s; }
  @keyframes girlBlink{
    0%,90%,100%{ opacity:0; }
    94%{ opacity:1; }
  }
  .bubble{
    padding:11px 15px;
    border-radius:var(--radius-md);
    font-size:14.5px;
    line-height:1.55;
    max-width:420px;
  }
  .row.bot .bubble{
    background:var(--bubble-bot);
    color:var(--text);
    border-bottom-left-radius:5px;
  }
  .row.user .bubble{
    background:var(--bubble-user);
    color:#7A3F22;
    border-bottom-right-radius:5px;
    font-weight:600;
  }

  .typing .bubble{
    display:flex;
    align-items:center;
    gap:4px;
    padding:14px 16px;
  }
  .typing .bubble span{
    width:6px;height:6px;border-radius:50%;
    background:var(--accent);
    opacity:.5;
    animation:pulse 1s infinite ease-in-out;
  }
  .typing .bubble span:nth-child(2){animation-delay:.15s;}
  .typing .bubble span:nth-child(3){animation-delay:.3s;}

  /* ---------- Cards inside bubbles ---------- */
  .card{
    background:#fff;
    border:1px solid var(--border);
    border-radius:var(--radius-md);
    padding:14px 16px;
    max-width:420px;
    box-shadow:0 8px 20px -12px rgba(92,76,209,.25);
    overflow:hidden;
  }
  .card + .card{margin-top:8px;}
  .card-img{
    display:block;
    width:calc(100% + 32px);
    margin:-14px -16px 12px -16px;
    height:150px;
    object-fit:cover;
    background:linear-gradient(135deg, var(--bubble-bot), #FFF0E8);
  }
  .card-img.small{height:120px;}
  .card .card-title{
    font-family:var(--font-display);
    font-weight:600;
    font-size:15.5px;
    margin-bottom:4px;
  }
  .card .card-desc{
    font-size:13.5px;
    color:var(--text-soft);
    line-height:1.55;
    margin-bottom:10px;
  }
  .tag-row{display:flex; flex-wrap:wrap; gap:6px; margin-bottom:10px;}
  .tag{
    font-family:var(--font-mono);
    font-size:11px;
    padding:3px 9px;
    border-radius:100px;
    background:var(--bubble-bot);
    color:var(--accent-dark);
  }
  .tag.alt{background:#FFF0E8; color:#C55A2E;}
  .tag.mint{background:#E7F8F2; color:#2E9A78;}
  .card-link{
    display:inline-flex;
    align-items:center;
    gap:6px;
    font-size:12.5px;
    font-weight:600;
    color:#fff;
    background:var(--accent);
    padding:7px 13px;
    border-radius:100px;
    text-decoration:none;
    transition:background .2s ease;
  }
  .card-link:hover{background:var(--accent-dark);}
  .card-meta{
    font-family:var(--font-mono);
    font-size:11.5px;
    color:var(--text-soft);
    margin-bottom:6px;
  }

  /* ---------- Chips ---------- */
  #chips{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    padding:6px 2px 4px 34px;
  }
  .chip{
    border:1px solid var(--border);
    background:#fff;
    color:var(--text);
    font-family:var(--font-body);
    font-size:13px;
    font-weight:600;
    padding:9px 15px;
    border-radius:100px;
    cursor:pointer;
    transition:all .18s ease;
    animation:rise .35s ease both;
  }
  .chip:hover{
    background:var(--accent);
    border-color:var(--accent);
    color:#fff;
    transform:translateY(-1px);
  }
  .chip:disabled{opacity:.4; cursor:default; pointer-events:none;}

  footer.chatfoot{
    border-top:1px solid var(--border);
    padding:12px 20px;
    text-align:center;
    font-size:11.5px;
    color:var(--text-soft);
    font-family:var(--font-mono);
    flex-shrink:0;
    background:#FDFBFF;
  }

  @media (max-width:480px){
    body{padding:0;}
    #app{height:100vh; border-radius:0; max-width:100%;}
    .bubble, .card{max-width:78vw;}
  }

  @media (prefers-reduced-motion: reduce){
    *{animation-duration:.001ms !important; transition-duration:.001ms !important;}
  }
</style>
</head>
<body>

<div id="splash">

  <defs>

<div id="app">
  <header class="chatbar">
    <div class="avatar">
      <img src="images/karakter.png" alt="Azra İrem" style="width:100%;height:100%;object-fit:cover;">
    </div>
    <div class="chatbar-info">
      <div class="name">Azra İrem</div>
      <div class="status">çevrimiçi</div>
    </div>
    <button class="home-btn" id="homeBtn">Ana Menü</button>
  </header>

  <div id="thread"></div>
  <div id="chips"></div>

  <footer class="chatfoot">azra irem dalhasanoğlu · yazılım mühendisliği öğrencisi</footer>
</div>

<script>
const thread = document.getElementById('thread');
const chipsBox = document.getElementById('chips');
const app = document.getElementById('app');
const splash = document.getElementById('splash');

function scrollDown(){ thread.scrollTop = thread.scrollHeight; }

const MINI_AVATAR = '<img src="images/karakter.png" alt="Azra İrem" style="width:100%;height:100%;object-fit:cover;display:block;">';

function addRow(kind, innerHTML){
  const row = document.createElement('div');
  row.className = 'row ' + kind;
  if(kind === 'bot'){
    row.innerHTML = '<div class="mini-avatar">'+MINI_AVATAR+'</div><div class="bubble">'+innerHTML+'</div>';
  } else {
    row.innerHTML = '<div class="bubble">'+innerHTML+'</div>';
  }
  thread.appendChild(row);
  scrollDown();
  return row;
}

function addCardRow(cardsHTML){
  const row = document.createElement('div');
  row.className = 'row bot';
  row.innerHTML = '<div class="mini-avatar">'+MINI_AVATAR+'</div><div style="display:flex;flex-direction:column;gap:8px;">'+cardsHTML+'</div>';
  thread.appendChild(row);
  scrollDown();
}

function showTyping(){
  const row = document.createElement('div');
  row.className = 'row bot typing';
  row.innerHTML = '<div class="mini-avatar">'+MINI_AVATAR+'</div><div class="bubble"><span></span><span></span><span></span></div>';
  thread.appendChild(row);
  scrollDown();
  return row;
}

function wait(ms){ return new Promise(r => setTimeout(r, ms)); }

async function botSay(text, ms){
  const t = showTyping();
  await wait(ms || 700 + Math.min(text.length * 12, 900));
  t.remove();
  addRow('bot', text);
  await wait(120);
}

async function botCards(cardsHTML, ms){
  const t = showTyping();
  await wait(ms || 800);
  t.remove();
  addCardRow(cardsHTML);
  await wait(120);
}

function userSay(text){
  addRow('user', text);
}

function setChips(list){
  chipsBox.innerHTML = '';
  list.forEach(([label, handler]) => {
    const b = document.createElement('button');
    b.className = 'chip';
    b.textContent = label;
    b.onclick = () => {
      Array.from(chipsBox.children).forEach(c => c.disabled = true);
      userSay(label);
      chipsBox.innerHTML = '';
      handler();
    };
    chipsBox.appendChild(b);
  });
}

const MENU = [
  ['Azra\'yı Tanıyın', flowAbout],
  ['Portfolyo', flowProjects],
  ['Yetenekler & Sertifikalar', flowSkills],
  ['Deneyim', flowExperience],
  ['İletişim', flowContact],
];

function backToMenu(){
  setChips(MENU);
}

async function flowAbout(){
  await botSay('Merhaba, ben Azra İrem Dalhasanoğlu.');
  await botSay('Yazılım Mühendisliği bölümünde son sınıf öğrencisiyim.');
  await botSay('Kod yazarken en çok verinin arkasındaki hikâyeyi çözmekten ve sağlam kurgulanmış bir backend mimarisi kurmaktan keyif alıyorum.');
  await botSay('Bu yüzden veri bilimi ve backend geliştirme benim asıl ilgi alanım; sistemleri sağlam temeller üzerine kurabilmek için yazılım mimarisi ve design pattern\'lara da ayrı bir önem veriyorum.');
  await botSay('İngilizcem orta-üstü seviyede; hem güncel hem teknik konularda rahatça iletişim kurabiliyorum.');
  await botSay('Almanca da ise şu an giriş seviyesindeyim ve öğrenmeye hevesle devam ediyorum.');
  await botSay('Başka merak ettiğin bir şey var mı?');
  backToMenu();
}

async function flowProjects(){
  await botSay('İşte üzerinde çalıştığım bazı projeler.');
  await botCards(`
    <div class="card">
      <img class="card-img" src="images/proje-kitap-oneri.jpg" alt="Kitap Öneri Sistemi görseli">
      <div class="card-title">Kitap Öneri Sistemi</div>
      <div class="card-desc">Kaggle üzerinden alınan bir veri seti ile makine öğrenmesi kullanarak puanlara ve türlere göre kitap önerisinde bulunan bir sistem.</div>
      <div class="tag-row"><span class="tag">Python</span><span class="tag mint">Machine Learning</span><span class="tag alt">HTML</span><span class="tag alt">CSS</span></div>
      <a class="card-link" href="https://github.com/azrairemd/book-recommendation-system" target="_blank" rel="noopener">GitHub'da gör →</a>
    </div>
  `, 900);
  await botCards(`
    <div class="card">
      <img class="card-img" src="images/proje-dolar-tahmin.jpg" alt="Dolar Kuru Tahmin Sistemi görseli">
      <div class="card-title">Dolar Kuru Tahmin Sistemi</div>
      <div class="card-desc">Makine öğrenmesi modelleri kullanılarak USD/TRY kurunun tahmin edilmeye çalışıldığı bir proje.</div>
      <div class="tag-row"><span class="tag">Python</span><span class="tag mint">Machine Learning</span></div>
      <a class="card-link" href="https://github.com/azrairemd/usdtry-exchange-rate-prediction" target="_blank" rel="noopener">GitHub'da gör →</a>
    </div>
  `, 700);
  await botCards(`
    <div class="card">
      <img class="card-img" src="images/proje-camasirhane.jpg" alt="Çamaşırhane Yönetim Sistemi görseli">
      <div class="card-title">Çamaşırhane Yönetim Sistemi</div>
      <div class="card-desc">Müşteri ve kuryelerin iletişim kurabildiği, çamaşır yıkama hizmetini uçtan uca yöneten bir platform. Bir ekip projesi olarak geliştirildi.</div>
      <div class="tag-row"><span class="tag">JavaScript</span><span class="tag">React</span></div>
      <a class="card-link" href="https://github.com/zeynephcelikoglu/laundry-management-system" target="_blank" rel="noopener">GitHub'da gör →</a>
    </div>
  `, 700);
  await botCards(`
    <div class="card">
      <img class="card-img" src="images/proje-notcum.jpg" alt="Notcum platformu görseli">
      <div class="card-title">Notcum — Öğrenci Not Paylaşım Platformu</div>
      <div class="card-desc">Üniversite öğrencilerinin ders notlarını birbirleriyle ya da kırtasiyeler aracılığıyla online veya fiziksel olarak paylaşabildiği bir not alışveriş sistemi.</div>
      <div class="tag-row"><span class="tag alt">HTML</span><span class="tag">Java</span><span class="tag alt">CSS</span><span class="tag">JS</span></div>
      <a class="card-link" href="https://github.com/azrairemd/notcum" target="_blank" rel="noopener">GitHub'da gör →</a>
    </div>
  `, 700);
  await botSay('Detaylar ve kod için repolara göz atabilirsin.');
  backToMenu();
}

async function flowSkills(){
  await botSay('Kullandığım diller ve framework\'ler:');
  await botCards(`
    <div class="tag-row" style="margin-bottom:0;">
      <span class="tag">Python</span><span class="tag">Java</span><span class="tag">C#</span>
      <span class="tag mint">Django</span><span class="tag mint">Spring Boot</span><span class="tag mint">ASP.NET</span>
    </div>
  `, 600);
  await botSay('Bu liste büyümeye devam ediyor, bana sordukça güncelliyorum.');
  await botSay('Sahip olduğum sertifikalar:');
  await botCards(`
    <div class="card">
      <img class="card-img small" src="images/sertifika-makine-ogrenmesi.jpg" alt="Makine Öğrenmesi sertifikası">
      <div class="card-title">Makine Öğrenmesi</div>
      <div class="card-meta">BTK Akademi</div>
